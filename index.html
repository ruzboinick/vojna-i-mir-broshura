<script>
    $(document).ready(function() {

        var totalPages = $('#magazine').children().length;

        // Автоподгонка размера под экран
        function resizeBook() {
            var windowW = $(window).width();
            var windowH = $(window).height();
            var ratio = 2400 / 1698;
            var maxW = windowW - 160;
            var maxH = windowH - 80;
            var newW, newH;

            if (maxW / maxH > ratio) {
                newH = maxH;
                newW = newH * ratio;
            } else {
                newW = maxW;
                newH = newW / ratio;
            }

            $('#magazine').css({
                width: newW + 'px',
                height: newH + 'px'
            });
        }

        resizeBook();
        $(window).resize(resizeBook);

        // Запуск Turn.js
        $('#magazine').turn({
            display: 'double',
            acceleration: true,
            gradients: true,
            elevation: 50,
            duration: 800,
            pages: totalPages,
            range: 3
        });

        // Стрелки и подсказка
        $('<style>')
            .text(`
                .flip-arrow {
                    position: fixed; top: 50%; transform: translateY(-50%);
                    width: 80px; height: 120px; cursor: pointer; z-index: 9999;
                    display: flex; align-items: center; justify-content: center;
                    transition: background 0.2s; border-radius: 8px; user-select: none;
                }
                .flip-arrow:hover { background: rgba(255, 255, 255, 0.08); }
                .flip-arrow svg { width: 36px; height: 36px; opacity: 0.25; transition: opacity 0.2s; }
                .flip-arrow:hover svg { opacity: 0.8; }
                #prev-arrow { left: 0; }
                #next-arrow { right: 0; }
                #fullscreen-hint {
                    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                    color: rgba(255,255,255,0.5); font-family: Georgia, serif;
                    font-size: 18px; z-index: 10000; pointer-events: none; transition: opacity 0.6s;
                }
            `)
            .appendTo('head');

        // Стрелка "Назад"
        $('<div>')
            .attr('id', 'prev-arrow')
            .addClass('flip-arrow')
            .html('<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>')
            .on('click', function(e) { e.stopPropagation(); $('#magazine').turn('previous'); })
            .appendTo('body');

        // Стрелка "Вперёд"
        $('<div>')
            .attr('id', 'next-arrow')
            .addClass('flip-arrow')
            .html('<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>')
            .on('click', function(e) { e.stopPropagation(); $('#magazine').turn('next'); })
            .appendTo('body');

        // Подсказка
        var $hint = $('<div id="fullscreen-hint">Кликните в любом месте, чтобы открыть во весь экран</div>').appendTo('body');

        // Фуллскрин с перезагрузкой размеров (фикс серых краёв)
        $(document).on('click', function() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }

            $hint.css('opacity', '0');
            setTimeout(function() { $hint.remove(); }, 600);

            // Ждём переход в фуллскрин и пересобираем книгу
            setTimeout(function() {
                resizeBook();
                $('#magazine').turn('size', $('#magazine').width(), $('#magazine').height());
                var currentPage = $('#magazine').turn('page');
                $('#magazine').turn('page', 1);
                setTimeout(function() {
                    $('#magazine').turn('page', currentPage);
                }, 100);
            }, 500);
        });
    });
</script>
